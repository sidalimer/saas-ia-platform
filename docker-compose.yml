services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saasia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saasia_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-saasia}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saasia}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    ports:
      - "1025:1025"
      - "8025:8025"

  prometheus:
    image: prom/prometheus:latest
    platform: linux/amd64
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      gateway:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # ── Backend Services ────────────────────────────────────────
  db-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: services/db-service
        SERVICE_WORKSPACE: "@saas-ia/db-service"
        SERVICE_PORT: "4001"
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://saasia:saasia_dev_password@postgres:5432/saasia?schema=public}
    command: ["sh", "-c", "npx prisma db push --schema=services/db-service/prisma/schema.prisma --accept-data-loss && cd services/db-service && npx tsx prisma/seed.ts; cd /app && node services/db-service/dist/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:4001/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: services/auth-service
        SERVICE_WORKSPACE: "@saas-ia/auth-service"
        SERVICE_PORT: "4002"
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      DB_SERVICE_URL: http://db-service:4001
      NOTIFICATION_SERVICE_URL: http://notification-service:4003
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:4002/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: services/notification-service
        SERVICE_WORKSPACE: "@saas-ia/notification-service"
        SERVICE_PORT: "4003"
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      DB_SERVICE_URL: http://db-service:4001
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-noreply@saas-ia.local}
    depends_on:
      db-service:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:4003/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: services/ai-service
        SERVICE_WORKSPACE: "@saas-ia/ai-service"
        SERVICE_PORT: "4004"
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      DB_SERVICE_URL: http://db-service:4001
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:4004/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: services/payment-service
        SERVICE_WORKSPACE: "@saas-ia/payment-service"
        SERVICE_PORT: "4005"
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      DB_SERVICE_URL: http://db-service:4001
      NOTIFICATION_SERVICE_URL: http://notification-service:4003
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:4005/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  metrics-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: services/metrics-service
        SERVICE_WORKSPACE: "@saas-ia/metrics-service"
        SERVICE_PORT: "4006"
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:4006/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Gateway ─────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_PATH: gateway
        SERVICE_WORKSPACE: "@saas-ia/gateway"
        SERVICE_PORT: "8080"
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DB_SERVICE_URL: http://db-service:4001
      AUTH_SERVICE_URL: http://auth-service:4002
      NOTIFICATION_SERVICE_URL: http://notification-service:4003
      AI_SERVICE_URL: http://ai-service:4004
      PAYMENT_SERVICE_URL: http://payment-service:4005
      METRICS_SERVICE_URL: http://metrics-service:4006
    depends_on:
      db-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      metrics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:8080/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      VITE_GATEWAY_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
